spring.datasource.username=admin
spring.datasource.password=shin1656

# 2. MyBatis 설정
# XML 매퍼 파일들의 위치 (src/main/resources/mappers 폴더 안에 .xml 파일들을 둘 경우)
mybatis.mapper-locations=classpath:mappers/**/*.xml

# DTO 객체들이 모여있는 패키지 경로 (XML에서 resultType에 클래스명만 쓸 수 있게 해줌)
# 예: com.example.demo.dto
mybatis.type-aliases-package=com.test.withdayback

# DB의 언더바 컬럼명(user_id)을 자바의 카멜케이스 변수명(userId)으로 자동 매핑
mybatis.configuration.map-underscore-to-camel-case=true

mybatis.configuration.jdbc-type-for-null=NULL

# 실행되는 SQL 쿼리를 콘솔로그에 출력 (개발 시 유용)
logging.level.com.test.withdayback.mapper=debug

